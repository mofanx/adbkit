name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download ADB binaries
        env:
          ADB_DOWNLOAD_URL: ${{ secrets.ADB_DOWNLOAD_URL }}
          ADB_GITHUB_REPO: ${{ secrets.ADB_GITHUB_REPO }}
          ADB_RELEASE_TAG: ${{ secrets.ADB_RELEASE_TAG }}
        run: |
          chmod +x scripts/download_adb_binaries.sh
          if [ -n "$ADB_DOWNLOAD_URL" ] || [ -n "$ADB_GITHUB_REPO" ]; then
            ./scripts/download_adb_binaries.sh || echo "::warning::ADB binary download failed, build will use fallback"
          else
            echo "::warning::No ADB_DOWNLOAD_URL or ADB_GITHUB_REPO secret set. ADB binaries not bundled."
            echo "Set these secrets to bundle ADB binaries in the APK."
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: adbkit-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks

      - name: Build Release APK
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        with:
          name: adbkit-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
